<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Milena Carecho">
    <title>Mudança de cor de texto quando entra em outra div</title>
    <link rel="stylesheet" type="text/css" href="style.css">
</head>
<body>
<picture>
    <source srcset="gif/dia03.webp" type="image/webp">
    <img src="gif/dia03.gif" alt="CSS Animation" loading="lazy" style="max-width:100%;height:auto;">
</picture>
<section>
    <span class="sliding">
        <span>DESAFIO</span>
        <span>30</span>
        <span>DIAS</span>
        <span>CSS</span>
        <span> - </span>
        <span>DESAFIO</span>
        <span>30</span>
        <span>DIAS</span>
        <span>CSS</span>
    </span>
    <div class="wrapper">
        <span class="sliding">
            <span>DESAFIO</span>
            <span>30</span>
            <span>DIAS</span>
            <span>CSS</span>
            <span> - </span>
            <span>DESAFIO</span>
            <span>30</span>
            <span>DIAS</span>
            <span>CSS</span>
        </span>
    </div>
</section>
    
</body>
</html>
